version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: saas-mongodb
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    networks:
      - saas-network

  redis:
    image: redis:latest
    container_name: saas-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - saas-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: saas-backend
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: development
      PORT: 4000
      MONGO_URI: mongodb://admin:password@mongodb:27017/saas-collab?authSource=admin
      JWT_SECRET: your_super_secret_key
      REDIS_URL: redis://redis:6379
    depends_on:
      - mongodb
      - redis
    networks:
      - saas-network

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: saas-frontend
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: http://localhost:4000
    depends_on:
      - backend
    networks:
      - saas-network

volumes:
  mongodb_data:
  redis_data:

networks:
  saas-network:
    driver: bridge
